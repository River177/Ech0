name: 测试 SSH 连接

on:
  workflow_dispatch:

jobs:
  test-ssh:
    name: 测试服务器连接
    runs-on: ubuntu-latest
    
    steps:
      - name: 测试 SSH 连接
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "✅ SSH 连接成功！"
            echo "================================"
            echo "主机名: $(hostname)"
            echo "用户: $(whoami)"
            echo "当前目录: $(pwd)"
            echo "================================"
            echo "Docker 版本:"
            docker --version
            echo "================================"
            echo "Docker Compose 版本:"
            docker compose version
            echo "================================"
            echo "容器列表:"
            docker ps -a
            echo "================================"
            echo "磁盘空间:"
            df -h /
            echo "================================"
